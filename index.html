<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roskilde 2026 Festival App</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const App = () => {
  const [username, setUsername] = useState('');
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [isDark, setIsDark] = useState(true);
  const [textSize, setTextSize] = useState(1);
  const [favorites, setFavorites] = useState([]);
  const [meetHere, setMeetHere] = useState([]);
  const [selectedDay, setSelectedDay] = useState('Sunday 28th June');
  const [viewMode, setViewMode] = useState('schedule');
  const [adminPassword, setAdminPassword] = useState('');
  const [adminLogged, setAdminLogged] = useState(false);
  const [lineup, setLineup] = useState({});
  const [friends, setFriends] = useState(['Sirild', 'Alma']);
  const [version] = useState('2.0.0-beta');
  const [loading, setLoading] = useState(true);
  const [editingFriends, setEditingFriends] = useState(false);
  const [newFriend, setNewFriend] = useState('');
  const [myPosition, setMyPosition] = useState('Orange Scene');
  const [friendsPositions, setFriendsPositions] = useState({});

  const arenaStages = ['Orange Scene', 'Arena', 'Lagune', 'The Yard', 'Stadion', 'Dancefloor', 'Skate', 'Re:Act', 'Grow', 'Cinema', 'Rehearsals of Belonging', 'Eos'];

  // Load lineup data
  useEffect(() => {
    if (typeof ROSKILDE_LINEUP !== 'undefined') {
      setLineup(ROSKILDE_LINEUP);
    }
    setLoading(false);
  }, []);

  // Load user data from localStorage
  useEffect(() => {
    if (username && isLoggedIn) {
      const savedFavs = localStorage.getItem(`roskilde-fav-${username}`);
      const savedPos = localStorage.getItem(`roskilde-pos-${username}`);
      const savedFriends = localStorage.getItem(`roskilde-friends-${username}`);
      
      if (savedFavs) setFavorites(JSON.parse(savedFavs));
      if (savedPos) setMyPosition(savedPos);
      if (savedFriends) setFriends(JSON.parse(savedFriends));
    }
  }, [username, isLoggedIn]);

  // Save user data
  useEffect(() => {
    if (username && isLoggedIn) {
      localStorage.setItem(`roskilde-fav-${username}`, JSON.stringify(favorites));
      localStorage.setItem(`roskilde-pos-${username}`, myPosition);
      localStorage.setItem(`roskilde-friends-${username}`, JSON.stringify(friends));
    }
  }, [favorites, myPosition, friends, username, isLoggedIn]);

  const handleLogin = (e) => {
    e.preventDefault();
    if (username.trim()) {
      setIsLoggedIn(true);
    }
  };

  const handleAdminLogin = (e) => {
    e.preventDefault();
    if (adminPassword === 'rock') {
      setAdminLogged(true);
      setAdminPassword('');
    } else {
      alert('Wrong password');
      setAdminPassword('');
    }
  };

  const toggleFavorite = (artist) => {
    setFavorites(prev =>
      prev.includes(artist)
        ? prev.filter(a => a !== artist)
        : [...prev, artist]
    );
  };

  const toggleMeetHere = (artist) => {
    setMeetHere(prev =>
      prev.includes(artist)
        ? prev.filter(a => a !== artist)
        : [...prev, artist]
    );
  };

  const addFriend = (e) => {
    e.preventDefault();
    if (newFriend.trim() && !friends.includes(newFriend)) {
      setFriends([...friends, newFriend]);
      setNewFriend('');
    }
  };

  const removeFriend = (friendName) => {
    setFriends(friends.filter(f => f !== friendName));
    const newPositions = { ...friendsPositions };
    delete newPositions[friendName];
    setFriendsPositions(newPositions);
  };

  const setFriendPosition = (friendName, stage) => {
    setFriendsPositions({ ...friendsPositions, [friendName]: stage });
  };

  const updateShow = (day, stage, showId, updates) => {
    setLineup(prev => ({
      ...prev,
      [day]: {
        ...prev[day],
        [stage]: prev[day][stage].map(show =>
          show.id === showId ? { ...show, ...updates } : show
        )
      }
    }));
  };

  const deleteShow = (day, stage, showId) => {
    setLineup(prev => ({
      ...prev,
      [day]: {
        ...prev[day],
        [stage]: prev[day][stage].filter(show => show.id !== showId)
      }
    }));
  };

  const addShow = (day, stage) => {
    const newId = Date.now().toString();
    setLineup(prev => ({
      ...prev,
      [day]: {
        ...prev[day],
        [stage]: [...(prev[day][stage] || []), { id: newId, time: '20:00', artist: 'New Artist', type: 'music' }]
      }
    }));
  };

  if (!isLoggedIn) {
    return (
      <div className={`min-h-screen flex items-center justify-center ${isDark ? 'bg-gray-900' : 'bg-gray-100'}`}>
        <div className={`p-8 rounded-lg ${isDark ? 'bg-gray-800' : 'bg-white'} shadow-xl max-w-md w-full mx-4`}>
          <h1 className={`text-4xl font-bold mb-2 text-center ${isDark ? 'text-orange-400' : 'text-orange-600'}`}>
            ROSKILDE
          </h1>
          <p className={`text-center mb-8 ${isDark ? 'text-gray-400' : 'text-gray-600'}`}>
            28.06 - 04.07 2026
          </p>
          <form onSubmit={handleLogin}>
            <input
              type="text"
              placeholder="Enter your name..."
              value={username}
              onChange={(e) => setUsername(e.target.value)}
              className={`w-full p-3 rounded border-2 ${isDark ? 'bg-gray-700 border-gray-600 text-white' : 'bg-gray-100 border-gray-300'} mb-4`}
              style={{ fontSize: `${16 * textSize}px` }}
              autoFocus
            />
            <button
              type="submit"
              disabled={!username.trim()}
              className="w-full bg-orange-600 hover:bg-orange-700 disabled:bg-gray-500 text-white font-bold py-2 px-4 rounded"
            >
              Enter Festival
            </button>
          </form>
        </div>
      </div>
    );
  }

  if (loading) {
    return (
      <div className={`min-h-screen flex items-center justify-center ${isDark ? 'bg-gray-900' : 'bg-gray-100'}`}>
        <div className={`p-8 text-center ${isDark ? 'text-gray-400' : 'text-gray-600'}`}>
          <p>Loading festival data...</p>
        </div>
      </div>
    );
  }

  const days = Object.keys(lineup);
  const currentLineup = lineup[selectedDay] || {};

  return (
    <div className={`min-h-screen ${isDark ? 'bg-gray-900 text-white' : 'bg-gray-50 text-gray-900'}`} style={{ fontSize: `${14 * textSize}px` }}>
      {/* Header */}
      <header className={`${isDark ? 'bg-gray-800' : 'bg-white'} border-b-2 border-orange-600 p-4 sticky top-0 z-50`}>
        <div className="max-w-7xl mx-auto flex justify-between items-center flex-wrap gap-4">
          <div>
            <h1 className="text-2xl font-bold text-orange-500">ROSKILDE 2026</h1>
            <p className={`text-sm ${isDark ? 'text-gray-400' : 'text-gray-600'}`}>28.06 - 04.07 • {username} @ {myPosition}</p>
          </div>

          <div className="flex gap-2 items-center flex-wrap">
            <div className="flex gap-1">
              {[0.85, 1, 1.15].map((size, i) => (
                <button
                  key={i}
                  onClick={() => setTextSize(size)}
                  className={`w-8 h-8 rounded font-bold text-xs ${textSize === size ? 'bg-orange-600 text-white' : isDark ? 'bg-gray-700' : 'bg-gray-200'}`}
                >
                  {['S', 'M', 'L'][i]}
                </button>
              ))}
            </div>

            <button
              onClick={() => setIsDark(!isDark)}
              className={`p-2 rounded ${isDark ? 'bg-gray-700' : 'bg-gray-200'}`}
              title="Toggle theme"
            >
              {isDark ? '☀️' : '🌙'}
            </button>

            <button
              onClick={() => {
                setIsLoggedIn(false);
                setUsername('');
                setAdminLogged(false);
              }}
              className="p-2 rounded bg-red-600 hover:bg-red-700 text-white"
              title="Logout"
            >
              ⬅️
            </button>
          </div>
        </div>
      </header>

      {/* View Tabs */}
      <div className={`${isDark ? 'bg-gray-800' : 'bg-white'} border-b border-gray-700 p-4 sticky top-16 z-40`}>
        <div className="max-w-7xl mx-auto flex gap-2 flex-wrap">
          {['schedule', 'friends', 'map', 'admin'].map(mode => (
            <button
              key={mode}
              onClick={() => setViewMode(mode)}
              className={`px-4 py-2 rounded font-bold capitalize ${viewMode === mode ? 'bg-orange-600 text-white' : isDark ? 'bg-gray-700' : 'bg-gray-200'}`}
            >
              {mode === 'map' ? '🗺️ Arena' : mode === 'friends' ? '👥 Friends' : mode === 'admin' ? '⚙️ Admin' : '📋 Schedule'}
            </button>
          ))}
        </div>
      </div>

      {/* Main Content */}
      <main className="max-w-7xl mx-auto p-4">
        {viewMode === 'schedule' && (
          <>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6">
              {days.map(day => (
                <button
                  key={day}
                  onClick={() => setSelectedDay(day)}
                  className={`p-3 rounded font-bold transition ${
                    selectedDay === day
                      ? 'bg-orange-600 text-white'
                      : isDark ? 'bg-gray-800 hover:bg-gray-700' : 'bg-white hover:bg-gray-100'
                  }`}
                >
                  {day.split(' ')[0]}
                </button>
              ))}
            </div>

            <div className="grid gap-6">
              {Object.entries(currentLineup).map(([stage, shows]) => (
                <div key={stage} className={`${isDark ? 'bg-gray-800' : 'bg-white'} rounded-lg p-6 border-2 border-orange-600`}>
                  <h2 className="text-xl font-bold text-orange-500 mb-4">{stage}</h2>

                  <div className="grid gap-3">
                    {shows.map((show) => (
                      <div
                        key={show.id}
                        className={`p-3 rounded border-l-4 transition ${
                          show.type !== 'music'
                            ? 'border-blue-500'
                            : 'border-orange-500'
                        } ${
                          favorites.includes(show.artist)
                            ? isDark ? 'bg-orange-900 bg-opacity-50' : 'bg-orange-100'
                            : isDark ? 'bg-gray-700' : 'bg-gray-100'
                        }`}
                      >
                        <div className="flex justify-between items-center flex-wrap gap-2">
                          <div className="flex-1">
                            <div className="font-bold text-lg flex items-center gap-2">
                              {show.artist}
                              {show.type === 'art' && <span title="Art & Activism">🎨</span>}
                              {show.type === 'activity' && <span title="Activity">🎪</span>}
                              {show.type === 'film' && <span title="Film">🎬</span>}
                            </div>
                            <div className={`text-sm ${isDark ? 'text-gray-400' : 'text-gray-600'}`}>
                              {show.time} • {stage}
                              {show.type !== 'music' && (
                                <span className={`ml-2 px-2 py-1 rounded text-xs font-bold ${
                                  show.type === 'art' ? 'bg-purple-600 text-white' :
                                  show.type === 'activity' ? 'bg-green-600 text-white' :
                                  'bg-blue-600 text-white'
                                }`}>
                                  {show.type === 'art' ? 'ART' : show.type === 'activity' ? 'ACTIVITY' : 'FILM'}
                                </span>
                              )}
                            </div>
                          </div>

                          <div className="flex gap-2">
                            <button
                              onClick={() => toggleFavorite(show.artist)}
                              className={`px-3 py-1 rounded font-bold transition ${
                                favorites.includes(show.artist)
                                  ? 'bg-orange-600 text-white'
                                  : isDark ? 'bg-gray-600' : 'bg-gray-300'
                              }`}
                              title="Add to favorites"
                            >
                              ★
                            </button>

                            <button
                              onClick={() => toggleMeetHere(show.artist)}
                              className={`px-3 py-1 rounded font-bold transition ${
                                meetHere.includes(show.artist)
                                  ? 'bg-green-600 text-white'
                                  : isDark ? 'bg-gray-600' : 'bg-gray-300'
                              }`}
                              title="Møt meg her"
                            >
                              📍
                            </button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div className="mt-8">
              <div className={`${isDark ? 'bg-gray-800' : 'bg-white'} rounded-lg p-6`}>
                <h3 className="text-lg font-bold mb-3">★ Mine favoritter ({favorites.length})</h3>
                <div className="flex flex-wrap gap-2">
                  {favorites.slice(0, 8).map(fav => (
                    <div key={fav} className="bg-orange-600 text-white px-3 py-1 rounded-full text-sm font-bold">
                      {fav}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </>
        )}

        {viewMode === 'friends' && (
          <div className="grid gap-6">
            {/* My Position */}
            <div className={`${isDark ? 'bg-gray-800' : 'bg-white'} rounded-lg p-6`}>
              <h2 className="text-2xl font-bold mb-4">📍 Min posisjon</h2>
              
              <div className="mb-4">
                <label className="block mb-2 font-bold">Hvor står/planlegger du å stå?</label>
                <select
                  value={myPosition}
                  onChange={(e) => setMyPosition(e.target.value)}
                  className={`w-full p-3 rounded border-2 ${isDark ? 'bg-gray-700 border-gray-600 text-white' : 'bg-gray-100 border-gray-300'}`}
                >
                  {arenaStages.map(stage => (
                    <option key={stage} value={stage}>{stage}</option>
                  ))}
                </select>
              </div>

              <div className={`p-4 rounded ${isDark ? 'bg-gray-700' : 'bg-gray-100'} border-2 border-orange-600`}>
                <p className="font-bold text-orange-500">{username}</p>
                <p>📍 {myPosition}</p>
              </div>
            </div>

            {/* Friends List */}
            <div className={`${isDark ? 'bg-gray-800' : 'bg-white'} rounded-lg p-6`}>
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-2xl font-bold">👥 Vennegjengen ({friends.length})</h2>
                <button
                  onClick={() => setEditingFriends(!editingFriends)}
                  className={`px-4 py-2 rounded font-bold ${
                    editingFriends
                      ? 'bg-red-600 hover:bg-red-700'
                      : 'bg-blue-600 hover:bg-blue-700'
                  } text-white`}
                >
                  {editingFriends ? '✕ Done' : '✏️ Edit'}
                </button>
              </div>

              {editingFriends && (
                <form onSubmit={addFriend} className="mb-6 pb-6 border-b border-gray-700">
                  <div className="flex gap-2 mb-4">
                    <input
                      type="text"
                      placeholder="Add new friend..."
                      value={newFriend}
                      onChange={(e) => setNewFriend(e.target.value)}
                      className={`flex-1 p-3 rounded border-2 ${isDark ? 'bg-gray-700 border-gray-600 text-white' : 'bg-gray-100 border-gray-300'}`}
                    />
                    <button
                      type="submit"
                      className="px-4 py-3 bg-green-600 hover:bg-green-700 text-white rounded font-bold"
                    >
                      Add
                    </button>
                  </div>
                </form>
              )}

              <div className="grid gap-4">
                {friends.map(friend => (
                  <div key={friend} className={`p-4 rounded border-2 ${isDark ? 'bg-gray-700 border-gray-600' : 'bg-gray-100 border-gray-300'}`}>
                    <div className="flex justify-between items-center mb-3">
                      <div>
                        <p className="font-bold text-lg">{friend}</p>
                        <p className={`text-sm ${isDark ? 'text-gray-400' : 'text-gray-600'}`}>
                          📍 {friendsPositions[friend] || '(No position set)'}
                        </p>
                      </div>
                      {editingFriends && (
                        <button
                          onClick={() => removeFriend(friend)}
                          className="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded font-bold"
                        >
                          Remove
                        </button>
                      )}
                    </div>

                    {editingFriends && (
                      <select
                        value={friendsPositions[friend] || ''}
                        onChange={(e) => setFriendPosition(friend, e.target.value)}
                        className={`w-full p-2 rounded border ${isDark ? 'bg-gray-600 border-gray-500 text-white' : 'bg-white border-gray-300'} text-sm`}
                      >
                        <option value="">Set position...</option>
                        {arenaStages.map(stage => (
                          <option key={stage} value={stage}>{stage}</option>
                        ))}
                      </select>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {viewMode === 'map' && (
          <div className={`${isDark ? 'bg-gray-800' : 'bg-white'} rounded-lg p-8`}>
            <h2 className="text-2xl font-bold mb-6">🗺️ Arena Overview</h2>
            
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              {arenaStages.map(stage => {
                const peopleHere = [username, ...friends].filter(p => 
                  p === username ? myPosition === stage : friendsPositions[p] === stage
                );
                
                return (
                  <div 
                    key={stage} 
                    className={`p-4 rounded border-2 transition ${
                      myPosition === stage
                        ? 'bg-orange-600 border-orange-600 text-white'
                        : isDark ? 'bg-gray-700 border-gray-600' : 'bg-gray-100 border-gray-300'
                    }`}
                  >
                    <p className="font-bold">{stage}</p>
                    {peopleHere.length > 0 && (
                      <div className="mt-2 text-sm">
                        <p className="font-bold">People here:</p>
                        {peopleHere.map(person => (
                          <p key={person} className={myPosition === stage && person === username ? 'font-bold' : ''}>
                            {person === username ? `${person} (you)` : person}
                          </p>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {viewMode === 'admin' && (
          <div className={`${isDark ? 'bg-gray-800' : 'bg-white'} rounded-lg p-6`}>
            {!adminLogged ? (
              <form onSubmit={handleAdminLogin} className="max-w-md">
                <h2 className="text-2xl font-bold mb-4">⚙️ Admin Panel</h2>
                <input
                  type="password"
                  placeholder="Admin password"
                  value={adminPassword}
                  onChange={(e) => setAdminPassword(e.target.value)}
                  className={`w-full p-3 rounded border-2 ${isDark ? 'bg-gray-700 border-gray-600 text-white' : 'bg-gray-100 border-gray-300'} mb-4`}
                  autoFocus
                />
                <button
                  type="submit"
                  className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded"
                >
                  Login
                </button>
              </form>
            ) : (
              <div>
                <h2 className="text-2xl font-bold mb-6">📊 Admin Control Panel</h2>
                <div className={`${isDark ? 'bg-gray-700' : 'bg-gray-100'} p-4 rounded mb-6`}>
                  <p className="text-sm mb-2">📈 Total shows: {Object.values(lineup).flatMap(s => Object.values(s).flat()).length}</p>
                  <p className="text-sm mb-2">🎭 Scenes: {arenaStages.length}</p>
                  <p className="text-sm">📅 Days: {days.length}</p>
                </div>
                <button
                  onClick={() => setAdminLogged(false)}
                  className="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded"
                >
                  Logout
                </button>
              </div>
            )}
          </div>
        )}
      </main>

      {/* Footer */}
      <footer className={`${isDark ? 'bg-gray-800' : 'bg-white'} border-t border-gray-700 p-4 mt-12 text-center`}>
        <p className={isDark ? 'text-gray-400' : 'text-gray-600'}>
          Roskilde 2026 App • v{version}
        </p>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Load lineup data -->
<script src="lineup.js"></script>
</body>
</html>
